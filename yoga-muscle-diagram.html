// Body silhouette ellipses
function bodyEllipses(cx0){
  var E=[];
  E.push({cx:cx0,cy:52,rx:30,ry:36});
  E.push({cx:cx0,cy:93,rx:10,ry:12});
  E.push({cx:cx0-58,cy:115,rx:30,ry:22,t:"rotate(-15,"+(cx0-58)+",115)"});
  E.push({cx:cx0+58,cy:115,rx:30,ry:22,t:"rotate(15,"+(cx0+58)+",115)"});
  E.push({cx:cx0,cy:210,rx:62,ry:95});
  E.push({cx:cx0,cy:308,rx:62,ry:32});
  E.push({cx:cx0-83,cy:200,rx:18,ry:65,t:"rotate(-8,"+(cx0-83)+",200)"});
  E.push({cx:cx0+83,cy:200,rx:18,ry:65,t:"rotate(8,"+(cx0+83)+",200)"});
  E.push({cx:cx0-93,cy:308,rx:14,ry:55,t:"rotate(-5,"+(cx0-93)+",308)"});
  E.push({cx:cx0+93,cy:308,rx:14,ry:55,t:"rotate(5,"+(cx0+93)+",308)"});
  E.push({cx:cx0-27,cy:395,rx:30,ry:72,t:"rotate(-3,"+(cx0-27)+",395)"});
  E.push({cx:cx0+27,cy:395,rx:30,ry:72,t:"rotate(3,"+(cx0+27)+",395)"});
  E.push({cx:cx0-33,cy:488,rx:20,ry:52,t:"rotate(2,"+(cx0-33)+",488)"});
  E.push({cx:cx0+33,cy:488,rx:20,ry:52,t:"rotate(-2,"+(cx0+33)+",488)"});
  E.push({cx:cx0-37,cy:533,rx:28,ry:12});
  E.push({cx:cx0+37,cy:533,rx:28,ry:12});
  return E;
}

var ACTIVE=null;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function ellipseSVG(e,extra){
  var t=e.t?' transform="'+e.t+'"':'';
  return '<ellipse cx="'+e.cx+'" cy="'+e.cy+'" rx="'+e.rx+'" ry="'+e.ry+'"'+t+(extra||'')+'/>';
}

function buildBody(cx0,label){
  var es=bodyEllipses(cx0);
  var html='<g style="pointer-events:none">';
  es.forEach(function(e){html+=ellipseSVG(e,' fill="#0a2820" stroke="#2ae8b8" stroke-width="0.8" opacity="0.9"');});
  html+='</g>';
  // Label
  html+='<text x="'+cx0+'" y="565" text-anchor="middle" fill="#3a5a50" font-size="11" font-weight="500" style="font-family:\'DM Sans\',sans-serif;pointer-events:none;letter-spacing:0.18em;text-transform:uppercase">'+label+'</text>';
  return html;
}

function buildMuscleRegions(){
  var html='';
  Object.keys(MUSCLES).forEach(function(mid){
    var m=MUSCLES[mid];
    var c=C[m.chakra];
    var isActive=ACTIVE===mid;
    var regions=m.front.concat(m.back);
    if(!regions.length) return;
    html+='<g class="muscle-region'+(isActive?' active':'')+'" data-mid="'+mid+'" style="opacity:'+(isActive?'0.82':'0.38')+'">';
    regions.forEach(function(e){
      html+=ellipseSVG(e,' fill="'+c.glow+'" stroke="'+c.glow+'" stroke-width="1.5" style="filter:drop-shadow(0 0 '+(isActive?'10':'5')+'px '+c.glow+')"');
    });
    html+='</g>';
  });
  return html;
}

function buildDiagram(){
  return '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">'+
  '<svg viewBox="0 0 820 580" style="width:100%;max-width:820px;display:block;margin:0 auto;min-width:380px">'+
  '<defs>'+
  '<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'+
  '</defs>'+
  // Divider
  '<line x1="410" y1="20" x2="410" y2="560" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 6"/>'+
  // Bodies
  buildBody(205,"Front View")+
  buildBody(615,"Back View")+
  // Muscle regions
  buildMuscleRegions()+
  '</svg></div>';
}

    var f=FAM_INFO[fid];if(!f) return "";

    '<div style="font-size:0.64rem;text-transform:uppercase;letter-spacing:0.18em;color:'+fc.glow+';margin-bottom:4px;font-weight:600">'+esc(f.name)+'</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
    '<div style="font-size:0.78rem;color:#d8c8a8"><span style="color:#4caf50;font-size:0.65rem;font-weight:600;display:inline-block;margin-right:4px">B</span>'+esc(f.B)+'</div>'+
    '<div style="font-size:0.78rem;color:#d8c8a8"><span style="color:#ff9800;font-size:0.65rem;font-weight:600;display:inline-block;margin-right:4px">I</span>'+esc(f.I)+'</div>'+
    '<div style="font-size:0.78rem;color:#d8c8a8"><span style="color:#f44336;font-size:0.65rem;font-weight:600;display:inline-block;margin-right:4px">A</span>'+esc(f.A)+'</div>'+
    '</div></div>';
  }).join("");
  return '<div id="detail-panel" style="max-width:760px;margin:0.5rem auto 1rem;padding:1.4rem 1.5rem;background:rgba(6,2,18,0.9);border:1px solid '+c.hex+';border-radius:14px;box-shadow:0 0 35px '+c.glow+'18;backdrop-filter:blur(12px)">'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:0.8rem">'+
  '<div>'+
  '<div style="display:flex;align-items:center;gap:10px">'+
  '<div style="width:12px;height:12px;border-radius:50%;background:'+c.glow+';box-shadow:0 0 10px '+c.glow+'"></div>'+
  '<div style="font-family:\'Cormorant Garamond\',serif;font-size:1.65rem;color:'+c.glow+';font-weight:400;letter-spacing:0.05em">'+esc(m.name)+'</div>'+
  '</div>'+
  '<div style="font-size:0.78rem;color:#8a7868;margin-top:3px">'+esc(m.detail)+'</div>'+
  '<div style="margin-top:6px"><span style="font-size:0.67rem;padding:3px 10px;border-radius:14px;background:'+c.hex+'28;border:1px solid '+c.hex+'60;color:'+c.glow+'">'+c.e+' Chakra — '+c.s+'</span></div>'+
  '</div>'+
  '<button onclick="closeDetail()" style="background:none;border:none;color:#6a5a4a;font-size:1.9rem;cursor:pointer;line-height:1;padding:0 4px;flex-shrink:0" onmouseover="this.style.color=\'#f0e6d3\'" onmouseout="this.style.color=\'#6a5a4a\'">&#215;</button>'+
  '</div>'+
  '<p style="font-size:0.82rem;color:#b0a080;line-height:1.65;font-family:\'Cormorant Garamond\',serif;font-style:italic;border-left:2px solid '+c.hex+';padding-left:0.75rem;margin-bottom:0.9rem">'+esc(m.note)+'</p>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:0.9rem">'+
  '<div><div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.22em;color:#4a3a2a;margin-bottom:0.4rem">Strengthened by</div><div style="display:flex;flex-wrap:wrap;gap:2px">'+(strengthenFams||'<span style="color:#4a3a2a;font-size:0.78rem">—</span>')+'</div></div>'+
  '<div><div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.22em;color:#4a3a2a;margin-bottom:0.4rem">Stretched by</div><div style="display:flex;flex-wrap:wrap;gap:2px">'+(stretchFams||'<span style="color:#4a3a2a;font-size:0.78rem">—</span>')+'</div></div>'+
  '</div>'+
  '<div><div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.22em;color:#4a3a2a;margin-bottom:0.5rem">Key Poses by Family</div>'+
  '<div style="display:grid;gap:6px">'+poseRows+'</div></div>'+
  '</div>';
}

function buildMuscleGrid(){
  var html='<div style="max-width:760px;margin:0.8rem auto 0.2rem;padding:0 1rem">'+
  '<div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.28em;color:#4a3a2a;text-align:center;margin-bottom:0.55rem">Muscle Reference</div>'+
  '<div class="muscle-grid">';
  Object.keys(MUSCLES).forEach(function(mid){
    var m=MUSCLES[mid];
    var c=C[m.chakra];
    var isActive=ACTIVE===mid;
    html+='<span class="m-pill'+(isActive?' active':'')+'" data-mid="'+mid+'" style="background:'+c.hex+'20;border-color:'+c.hex+'55;color:'+c.glow+(isActive?';box-shadow:0 0 12px '+c.glow:'')+'">'+esc(m.name)+'</span>';
  });
  return html+'</div></div>';
}

function buildLegend(){
  var html='<div style="max-width:760px;margin:1rem auto 0;padding:0 1rem;text-align:center">'+
  '<div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.28em;color:#4a3a2a;margin-bottom:0.45rem">Chakra Color Key</div>'+
  '<div style="display:flex;justify-content:center;flex-wrap:wrap;gap:0.35rem">';
  Object.keys(C).forEach(function(key){
    var c=C[key];
    html+='<div style="display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:'+c.hex+'16;border:1px solid '+c.hex+'55;font-size:0.67rem">'+
    '<span style="width:7px;height:7px;border-radius:50%;background:'+c.glow+';display:inline-block;box-shadow:0 0 5px '+c.glow+'"></span>'+
    '<span style="color:'+c.glow+';font-weight:500">'+c.e+'</span>'+
    '<span style="color:#2a1a0a">|</span>'+
    '<span style="color:#7a6858;font-style:italic;font-family:\'Cormorant Garamond\',serif">'+c.s+'</span></div>';
  });
  return html+'</div></div>';
}

function render(){
  var app=document.getElementById("app");
  app.innerHTML=
  // HEADER
  '<div style="text-align:center;padding:2rem 1rem 0.8rem">'+
  '<div style="font-family:\'Cormorant Garamond\',serif;font-size:clamp(1.8rem,5vw,3.2rem);font-weight:300;letter-spacing:0.1em;background:linear-gradient(92deg,#5ae8c8,#40C4FF,#CE93D8,#00E676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1">Yoga Muscle Diagram</div>'+
  '<div style="font-family:\'Cormorant Garamond\',serif;font-style:italic;color:#9a8878;letter-spacing:0.25em;font-size:0.85rem;margin-top:0.3rem">Anatomy of the Practice</div>'+
  '<div style="margin-top:0.75rem;display:inline-flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;font-size:0.7rem">'+
  '<a href="yoga-family-tree.html" style="color:#FFD700;border:1px solid #FFD70055;padding:3px 13px;border-radius:20px;text-decoration:none;font-size:0.7rem">&#8592; Yoga Family Tree</a>'+
  '<span style="color:#888;border:1px solid #ffffff18;padding:3px 13px;border-radius:20px">Tap any muscle to explore</span>'+
  '</div></div>'+
  // DIAGRAM
  buildDiagram()+
  // MUSCLE GRID
  buildMuscleGrid()+
  // DETAIL PANEL
  '<div style="max-width:820px;margin:0.5rem auto 0;padding:0 1rem">'+buildDetail()+'</div>'+
  // LEGEND
  buildLegend()+
  '<div style="height:2rem"></div>';

  // Attach muscle region click handlers
  document.querySelectorAll(".muscle-region").forEach(function(g){
    g.addEventListener("click",function(){
      var mid=g.getAttribute("data-mid");
      ACTIVE=(ACTIVE===mid)?null:mid;
      render();
      if(ACTIVE){
        var dp=document.getElementById("detail-panel");
        if(dp) setTimeout(function(){dp.scrollIntoView({behavior:"smooth",block:"nearest"});},80);
      }
    });
  });
  // Attach muscle pill click handlers
  document.querySelectorAll(".m-pill").forEach(function(el){
    el.addEventListener("click",function(){
      var mid=el.getAttribute("data-mid");
      ACTIVE=(ACTIVE===mid)?null:mid;
      render();
      if(ACTIVE){
        var dp=document.getElementById("detail-panel");
        if(dp) setTimeout(function(){dp.scrollIntoView({behavior:"smooth",block:"nearest"});},80);
      }
    });
  });
}

function closeDetail(){ACTIVE=null;render();}

render();
</script>
</body>
</html>
